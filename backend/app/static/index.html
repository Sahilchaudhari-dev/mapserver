<!doctype html>
<html>
  <head>
    <title>Map Server</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      #map {
        height: 100vh;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      var indiaBounds = [
        [6.75, 68.18],
        [37.08, 97.42],
      ];
      var map = L.map("map").fitBounds(indiaBounds);
      L.tileLayer("/api/tiles/{z}/{x}/{y}.png", {
        attribution: "Self-hosted OSM",
        maxZoom: 18,
      }).addTo(map);
      fetch("/api/map-init")
        .then((response) => response.json())
        .then((data) => {
          L.geoJSON(data.boundary, {
            style: {
              color: "#000000",
              weight: 1,
              fillOpacity: 0,
            },
          }).addTo(map);
        })
        .catch((err) => console.error("Failed to load boundary:", err));
    </script>
  </body>
</html>
